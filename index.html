<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="./assessts/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="main">
        <div class="sidebar">
            <div class="nav">
                <div class="nav-option" style="opacity: 1">
                    <i class="fa-solid fa-house"></i>
                    <a href="#">Home</a>
                </div>         
                <div class="nav-option">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <a href="#">Search</a>
                </div>
            </div>
            <div class="library">
                <div class="options">
                    <div class="lib-options nav-option">
                        <img src="./assessts/library_icon.png">
                        <a href="#">Your Library</a>
                    </div>
                    <div class="icons">
                        <i class="fa-solid fa-plus"></i>
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>
                <div class="Lib-boxes">
                    <div class="box">
                         <p class="box-p1">
                         Create your first playlist
                        </p>
                        <p class="box-p2">
                        its easy it will help you
                        </p>
                        <button class="badge">Create Playlist</button>
                    </div>
                    <div class="box">
                         <p class="box-p1">
                         Find some podcast to follow
                        </p>
                        <p class="box-p2">
                        we'll keep you updated on new episodes
                        </p>
                        <button class="badge">Browse Podcasts</button>
  
                    </div>
                   
                    
                </div>
            </div>
        </div>
        <div class="Main-content">
            <div class="sticky-nav">
                <div class="sticky-nav-icons">
                    <img src="./assessts/backward_icon.png">
                    <img src="./assessts/forward_icon.png" class="hide">
                </div>
                <div class="sticky-nav-options">
                    <button class="badge navitem hide">Explore Premium</button>
                    <button class="badge navitem darkbadge"><i class="fa-regular fa-circle-down"></i> Install app</button>
                    <i class="fa-solid fa-user navitem darkbadge" style="margin:4px 0 0 2px; "></i>
                </div>
            </div>
            <div class="cards">
                <h2 class="cards-heading">Recently Played</h2>
                <div class="card-container">
                    <div class="card">
                        <img src="./assessts/card1img.jpeg" class="card-img">
                        <p class="title">Top 50 Global</p>
                        <p class="subtitle">Your daily mix of top track...</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="musicplayer">music player</div>
    </div>
</body>
</html>
